# Publish the docs site to GitHub Pages on every push to main.
# One-time setup: repository Settings -> Pages -> Source = "GitHub Actions".
name: Docs deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e ".[dev]"
      - run: mkdocs build --strict
      # llms.txt / llms-full.txt are served from the site root for LLM agents and indexers
      - run: python scripts/build_llms_txt.py
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # OIDC deploy to Pages; id-token stays isolated to this job (same policy as release.yml)
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
