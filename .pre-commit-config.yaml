repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        files: ^src/honestml/core/
        additional_dependencies: ["pydantic>=2", "numpy>=1.24"]

  - repo: local
    hooks:
      - id: import-linter
        name: import-linter (layer contracts)
        entry: lint-imports
        language: system
        pass_filenames: false
        always_run: true
